<div class="message-inspector">
  <div class="message-inspector__header">
    <div class="message-inspector__header-left">
      <button class="message-inspector__back-btn" (click)="goBack()" title="Back to Queue Explorer">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <div class="message-inspector__title-group">
        <h1 class="message-inspector__title">Message Inspector</h1>
        <span class="message-inspector__subtitle" *ngIf="queueName">
          {{ queueName }}
        </span>
      </div>
    </div>

    <div class="message-inspector__header-actions">
      <button
        class="message-inspector__action-btn"
        (click)="refreshMessage()"
        [disabled]="isLoading"
        title="Refresh message">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" [class.spinning]="isLoading">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        <span>Refresh</span>
      </button>
    </div>
  </div>

  <div class="message-inspector__content" *ngIf="!isLoading && !error">
    <ng-container *ngIf="hasMessage">
      <div class="message-inspector__main">
        <div class="message-inspector__left-panel">
          <app-message-metadata
            [metadata]="currentMessage!.metadata">
          </app-message-metadata>

          <app-conversation-context
            [context]="currentMessage!.conversationContext">
          </app-conversation-context>

          <app-related-messages
            [conversationMessages]="currentMessage!.relatedMessages"
            [dialogState]="currentMessage!.conversationContext?.dialogState || null"
            (messageSelected)="onMessageSelected($event)"
            (navigatePrevious)="onNavigatePrevious()"
            (navigateNext)="onNavigateNext()">
          </app-related-messages>
        </div>

        <div class="message-inspector__right-panel">
          <app-message-body-viewer
            [message]="currentMessage">
          </app-message-body-viewer>
        </div>
      </div>
    </ng-container>

    <div class="message-inspector__no-selection" *ngIf="!hasMessage && !queueName">
      <div class="message-inspector__empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <h2>No Message Selected</h2>
        <p>Select a message from the Queue Explorer to inspect its details, or navigate directly using the URL parameters.</p>
        <button class="message-inspector__cta-btn" (click)="goBack()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Go to Queue Explorer
        </button>
      </div>
    </div>
  </div>

  <div class="message-inspector__loading" *ngIf="isLoading">
    <app-loading-spinner size="large"></app-loading-spinner>
    <p>Loading message details...</p>
  </div>

  <div class="message-inspector__error" *ngIf="error && !isLoading">
    <div class="message-inspector__error-content">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <h3>Failed to Load Message</h3>
      <p>{{ error }}</p>
      <div class="message-inspector__error-actions">
        <button class="message-inspector__retry-btn" (click)="refreshMessage()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
          Retry
        </button>
        <button class="message-inspector__back-link" (click)="goBack()">
          Back to Queue Explorer
        </button>
      </div>
    </div>
  </div>
</div>
